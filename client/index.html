<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maincongklak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 min-h-screen flex flex-col items-center justify-center p-4 selection:bg-amber-200">
    <h1 class="text-4xl font-extrabold text-amber-900 mb-2 tracking-tight">maincongklak</h1>
    <p class="text-sm text-amber-700 mb-6 font-medium">Real-time Multiplayer Game</p>
    
    <div id="lobby" class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm border border-amber-100 mb-6">
        <h2 class="text-lg font-bold text-amber-900 mb-4">Masuk ke Ruangan</h2>
        <input id="room-input" type="text" class="w-full px-4 py-2 border border-amber-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 mb-3 text-center uppercase font-bold tracking-wider text-xl text-amber-900">
        <button onclick="joinRoom()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2.5 px-4 rounded-xl transition-all shadow-md">Gabung Game</button>
    </div>

    <div id="game-info" class="hidden flex flex-col items-center gap-1 mb-4 text-center">
        <div id="status-panel" class="text-xl font-bold text-amber-900 bg-amber-100 px-6 py-1.5 rounded-full shadow-sm">Menghubungkan database...</div>
        <span id="role-indicator" class="text-xs font-semibold text-amber-600 uppercase tracking-widest mt-1"></span>
    </div>

    <main id="game-board" class="hidden w-full max-w-4xl bg-amber-800 p-6 rounded-3xl shadow-2xl flex items-center justify-between gap-4 border-4 border-amber-950">
        <div id="hole-15" class="w-20 h-36 md:w-24 md:h-44 bg-amber-950 rounded-full flex items-center justify-center text-white font-black text-3xl shadow-[inset_0_4px_12px_rgba(0,0,0,0.6)]">0</div>
        <div class="flex-1 grid grid-rows-2 gap-4">
            <div class="grid grid-cols-7 gap-2 md:gap-3" id="p2-holes"></div>
            <div class="grid grid-cols-7 gap-2 md:gap-3" id="p1-holes"></div>
        </div>
        <div id="hole-7" class="w-20 h-36 md:w-24 md:h-44 bg-amber-950 rounded-full flex items-center justify-center text-white font-black text-3xl shadow-[inset_0_4px_12px_rgba(0,0,0,0.6)]">0</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
