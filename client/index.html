<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maincongklak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 min-h-screen flex flex-col items-center p-4 selection:bg-amber-200">
    
    <div class="mt-4 mb-6 text-center">
        <h1 class="text-4xl font-extrabold text-amber-900 mb-1 tracking-tight">maincongklak</h1>
        <p class="text-sm text-amber-700 font-medium">Real-time Multiplayer Game</p>
    </div>
    
    <div id="lobby" class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm border border-amber-100 mb-6">
        <h2 class="text-lg font-bold text-amber-900 mb-4 text-center">Masuk ke Ruangan</h2>
        <input id="room-input" type="text" class="w-full px-4 py-3 border-2 border-amber-200 rounded-xl focus:outline-none focus:border-amber-500 mb-4 text-center uppercase font-black tracking-widest text-2xl text-amber-900 bg-amber-50">
        <button onclick="joinRoom()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg active:scale-95">Gabung Game</button>
    </div>

    <div id="game-area" class="hidden w-full max-w-4xl flex flex-col gap-6">
        
        <div class="flex flex-col items-center gap-1 text-center">
            <div id="status-panel" class="text-xl font-bold text-amber-900 bg-amber-100 px-6 py-2 rounded-full shadow-sm">Menghubungkan...</div>
            <span id="role-indicator" class="text-xs font-bold text-amber-600 uppercase tracking-widest mt-2 bg-amber-100/50 px-3 py-1 rounded-full"></span>
        </div>

        <div class="w-full overflow-x-auto pb-4 custom-scrollbar">
            <main class="min-w-[700px] bg-amber-800 p-6 rounded-[3rem] shadow-2xl flex items-center justify-between gap-6 border-4 border-amber-950 mx-auto">
                
                <div id="hole-15" class="w-20 h-40 bg-amber-950 rounded-full flex items-center justify-center text-white font-black text-3xl shadow-[inset_0_8px_16px_rgba(0,0,0,0.6)]">0</div>
                
                <div class="flex-1 flex flex-col gap-4">
                    <div class="flex justify-between gap-2" id="p2-holes"></div>
                    <div class="flex justify-between gap-2" id="p1-holes"></div>
                </div>
                
                <div id="hole-7" class="w-20 h-40 bg-amber-950 rounded-full flex items-center justify-center text-white font-black text-3xl shadow-[inset_0_8px_16px_rgba(0,0,0,0.6)]">0</div>
            </main>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-amber-200 flex flex-col h-72 overflow-hidden">
            <div class="bg-amber-100 px-4 py-3 border-b border-amber-200 font-bold text-amber-900 text-sm flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    Live Chat Room
                </div>
                <span id="chat-room-id" class="text-amber-700 bg-amber-200 px-2 py-1 rounded-md text-xs"></span>
            </div>
            
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] bg-amber-50">
                <div class="text-center text-xs text-amber-600/60 font-medium my-2">-- Obrolan dimulai --</div>
            </div>
            
            <div class="p-3 bg-white border-t border-amber-100 flex gap-2">
                <input type="text" id="chat-input" placeholder="Ngeledek musuh di sini..." class="flex-1 px-4 py-2 bg-amber-50 border border-amber-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm" onkeypress="if(event.key === 'Enter') sendChat()">
                <button onclick="sendChat()" class="bg-amber-800 hover:bg-amber-900 text-white px-5 py-2 rounded-xl font-bold text-sm transition-all shadow-md active:scale-95">Kirim</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
    <style>
        /* Desain scrollbar tipis buat papan congklaknya */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fef3c7; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</body>
</html>
